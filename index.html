<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>El Bajo — Beach & Drinks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080806;--bg2:#0e0e0b;--card:#131310;--gold:#C9A84C;--gold2:#E8C06A;--text:#ffffff;--muted:#9a948c;}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;overflow-x:hidden;}

/* HEADER - Ajustado según PDF */
.hd{background:#000;padding:45px 20px 30px;text-align:center;position:relative;overflow:hidden;}
.hd::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% -10%,rgba(255,255,255,.04) 0%,transparent 65%);pointer-events:none;}
.logo{font-family:'Playfair Display',serif;font-size:4.5rem;font-weight:700;color:#fff;letter-spacing:-2px;line-height:0.85;text-transform:lowercase;}
.logo em{color:#fff;font-style:normal;}
.logo-sub{font-family:'Nunito',sans-serif;font-size:.65rem;letter-spacing:.5em;color:#fff;opacity:.6;text-transform:uppercase;margin-top:12px;font-weight:400;}

.info-bar{background:#000;padding:12px 18px;display:flex;align-items:center;justify-content:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.1);}
.ib-item{display:flex;align-items:center;gap:7px;font-size:.9rem;color:#fff;font-weight:600;font-family:'Playfair Display',serif;letter-spacing:.02em;}

.nav-wrap{position:sticky;top:0;z-index:100;background:rgba(8,8,6,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08);overflow-x:auto;scrollbar-width:none;}
.nav-wrap::-webkit-scrollbar{display:none;}
.nav-bar{display:flex;padding:9px 14px;gap:7px;min-width:max-content;}
.nb{background:transparent;border:1px solid rgba(255,255,255,.1);color:#aaa;border-radius:20px;padding:5px 13px;font-family:'Nunito',sans-serif;font-size:.76rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;}
.nb.on{background:#fff;color:#000;border-color:#fff;}

main{padding-bottom:70px;}
.sec{padding:28px 0 14px;border-bottom:1px solid rgba(255,255,255,.06);}

/* Títulos alineados a la izquierda */
.sh{padding:0 18px 14px;display:flex;align-items:center;justify-content:flex-start;gap:11px;text-align:left;}
.st{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;color:#E8C06A;letter-spacing: 1px;}

.il{padding:0 14px;}
.mi{display:flex;align-items:flex-start;justify-content:space-between;padding:11px 13px;background:#131310;border-radius:10px;margin-bottom:7px;border:1px solid rgba(255,255,255,.05);gap:10px;}
.mi.off{opacity:.35;}
.ii{flex:1;min-width:0;}
.in{font-weight:700;font-size:.88rem;color:#E8C06A;line-height:1.3;}
.id{font-size:.75rem;color:#fff;font-weight:400;margin-top:4px;line-height:1.5;opacity:.8;}
.ip{font-weight:700;font-size:.92rem;color:#fff;white-space:nowrap;flex-shrink:0;padding-top:1px;min-width:58px;text-align:right;}

/* LOGOS DE MARCAS */
.brand-strip {display: flex;justify-content: center;align-items: center;gap: 20px;padding: 10px 0;width: 100%;}
.brand-strip img {width: auto !important;object-fit: contain;display: block;margin: 0 auto !important;}

/* Ajustes específicos de logos */
.brand-strip img[src*="BRANCA"] { height: 280px !important; margin-top: -35px !important; margin-bottom: -50px !important; }
.brand-strip img[src*="BORGHETTI"] { height: 260px !important; margin-bottom: -15px !important; margin-top: -10px !important; }
.brand-strip img[src*="CASILLERO"] { height: 250px !important; margin-bottom: 35px !important; margin-top: 15px !important; }
.brand-strip img[src*="TRIBU"] { height: 270px !important; margin-bottom: -10px !important; }
.brand-strip img[src*="TRIVENTO"] { height: 200px !important; margin-bottom: -10px !important; }
.brand-strip img[src*="IMPERIAL"] { height: 140px !important; margin-bottom: 25px !important; }
.brand-strip img[src*="SPEED"] { height: 140px !important; margin-bottom: 25px !important; }
.brand-strip img[src*="SERNOVA"] { height: 120px !important; margin-bottom: 25px !important; }

.social-float{position:fixed;bottom:20px;right:18px;display:flex;flex-direction:column;gap:10px;z-index:200;}
.sf-btn{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.5);text-decoration:none;transition:transform .2s;}
.sf-btn:hover{transform:scale(1.1);}
.sf-ig{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);}
.sf-wa{background:#25D366;}

.wifi-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.wifi-overlay.open{display:flex;}
.wifi-popup{background:#131310;border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:28px 24px;text-align:center;width:min(300px,88vw);}

footer{background:#000;padding:40px 20px;text-align:center;border-top:1px solid rgba(255,255,255,.08);}
.fl{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;color:#fff;text-transform:lowercase;letter-spacing:-1px;}

.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;}
.loading-logo{font-family:'Playfair Display',serif;font-size:2rem;color:#fff;animation:pulse 1.5s ease-in-out infinite;text-transform:lowercase;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<div class="info-bar">
  <div class="ib-item">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    <span id="infoDir">Yrigoyen 900 · Villa Carlos Paz</span>
  </div>
</div>

<header class="hd">
  <div class="logo">el <em>bajo</em></div>
  <div class="logo-sub">Beach &amp; Drinks</div>
</header>

<div class="nav-wrap" id="nw">
  <div class="nav-bar" id="nb"></div>
</div>

<main id="mc">
  <div class="loading-screen">
    <div class="loading-logo">el bajo</div>
    <div style="font-size:.82rem;color:#aaa">Cargando carta...</div>
  </div>
</main>

<footer>
  <div class="fl">el bajo</div>
  <div class="logo-sub" style="margin-bottom:20px">Beach &amp; Drinks</div>
  <div class="finfo" id="footerInfo">
    <div style="display:flex;align-items:center;justify-content:center;gap:6px;font-size:.8rem;color:#aaa">
      Yrigoyen 900 · Villa Carlos Paz
    </div>
  </div>
</footer>

<div class="social-float">
  <a href="https://www.instagram.com/elbajobar" target="_blank" rel="noopener" class="sf-btn sf-ig">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="#fff" stroke="none"/></svg>
  </a>
  <a href="https://wa.me/5403541599597" target="_blank" rel="noopener" class="sf-btn sf-wa">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
  </a>
</div>

<script>
const MENU_URL = '/menu.json';

// Mapeo de logos: Borghetti movido a 'postres'
const BRAND_IMAGES = {
  'vinos':         { arriba: ['/img/TRIBU.png'],      abajo: ['/img/TRIVENTO.png'] },
  'espumantes':    { arriba: ['/img/CASILLERO.png'],  abajo: [] },
  'cervezas':      { arriba: ['/img/imperial.png'],   abajo: [] },
  'tragos-speed':  { arriba: ['/img/sernova.png', '/img/speed.png'], abajo: [] },
  'tragos':        { arriba: ['/img/BRANCA.png'],     abajo: [] },
  'postres':       { arriba: ['/img/borghetti.png'],  abajo: [] },
};

function brandStrip(imgs) {
  if (!imgs || imgs.length === 0) return '';
  const tags = imgs.map(src => `<img src="${src}" loading="lazy">`).join('');
  return `<div class="brand-strip">${tags}</div>`;
}

function fmtPrecio(n) {
  if (!n || n === 0) return '';
  return '$' + Number(n).toLocaleString('es-AR');
}

function renderMenu(data) {
  const mc = document.getElementById('mc');
  const nb = document.getElementById('nb');
  mc.innerHTML = '';
  nb.innerHTML = '';

  data.categorias.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'nb';
    btn.textContent = cat.nombre;
    btn.onclick = () => {
      const el = document.getElementById(cat.id);
      const offset = document.getElementById('nw').offsetHeight + 10;
      window.scrollTo({ top: el.offsetTop - offset, behavior: 'smooth' });
    };
    nb.appendChild(btn);

    const sec = document.createElement('section');
    sec.className = 'sec';
    sec.id = cat.id;

    let html = brandStrip(BRAND_IMAGES[cat.id]?.arriba);
    html += `<div class="sh"><h2 class="st">${cat.nombre}</h2></div>`;
    if (cat.nota) html += `<div class="note">${cat.nota}</div>`;
    html += `<div class="il">`;
    cat.items.forEach(item => {
      const off = !item.disponible;
      html += `<div class="mi${off ? ' off' : ''}">
        <div class="ii">
          <div class="in">${item.nombre}</div>
          ${item.descripcion ? `<div class="id">${item.descripcion}</div>` : ''}
        </div>
        <div class="ip">${off ? 'No hay' : fmtPrecio(item.precio)}</div>
      </div>`;
    });
    html += `</div>`;
    html += brandStrip(BRAND_IMAGES[cat.id]?.abajo);

    sec.innerHTML = html;
    mc.appendChild(sec);
  });
}

async function init() {
  try {
    const res = await fetch(MENU_URL);
    const data = await res.json();
    renderMenu(data);
  } catch(e) {
    document.getElementById('mc').innerHTML = `<div style="text-align:center;padding:50px;color:#aaa;">Error al cargar menú</div>`;
  }
}

init();
</script>
</body>
</html>
